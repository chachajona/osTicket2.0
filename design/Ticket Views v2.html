        :root {

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {

        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        .app-shell { width: 100%; max-width: 1440px; height: 92vh; max-height: 900px; background: var(--background); border-radius: var(--radius-lg); border: 1px solid var(--border); box-shadow: var(--shadow-card); display: flex; overflow: hidden; position: relative; }

        /* Sidebar */
        .sidebar { width: 180px; flex-shrink: 0; border-right: 1px solid var(--border); display: flex; flex-direction: column; background: var(--background); }
        .sidebar-profile { padding: 16px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 150ms; }

        .sidebar-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--gradient-brand); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; letter-spacing: 0.02em; flex-shrink: 0; }

        .sidebar-profile-info p { font-size: 9px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-secondary); margin-top: 1px; }
        .search-box { padding: 12px 14px; }
        .search-box .inner { position: relative; display: flex; align-items: center; }
        .search-box input { width: 100%; padding: 7px 40px 7px 30px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; font-family: var(--font-sans); outline: none; color: var(--text-primary); }
        .search-box input::placeholder { color: var(--text-secondary); }

        .nav-section { padding: 0 10px; }

        .nav-item:hover { background: rgba(244,242,235,0.6); color: var(--text-primary); }

        .nav-item.active .badge { background: rgba(255,255,255,0.3); }
        .sidebar-section { padding: 0 14px; margin-top: 16px; }
        .sidebar-section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
        .sidebar-section-header button { font-size: 9px; font-family: var(--font-sans); font-weight: 500; color: var(--primary); background: none; border: none; cursor: pointer; letter-spacing: 0.05em; text-transform: uppercase; }
        .convo-item { display: flex; align-items: center; justify-content: space-between; padding: 6px; border-radius: var(--radius-md); cursor: pointer; transition: background 150ms; }
        .convo-item:hover { background: var(--surface); }
        .convo-item.elevated { background: var(--background); border: 1px solid var(--border); box-shadow: rgba(0,0,0,0.04) 0 1px 3px; padding: 8px 10px; margin: 0 -2px; }
        .convo-icon { width: 28px; height: 28px; border-radius: var(--radius-sm); background: var(--surface); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 14px; flex-shrink: 0; }
        .convo-count { min-width: 18px; height: 18px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 600; }
        .convo-count.hot { background: var(--primary); color: #fff; }
        .convo-count.muted { background: var(--neutral-50); color: var(--text-secondary); }
        .pinned-item { display: flex; align-items: center; justify-content: space-between; padding: 3px 0; cursor: pointer; }
        .pinned-item:hover .pin-icon { color: var(--primary); }
        .pinned-dot { width: 14px; height: 14px; border-radius: 50%; background: var(--success); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 8px; flex-shrink: 0; }
        .pin-icon { color: var(--neutral-100); font-size: 11px; transition: color 150ms; }
        .sidebar-footer { margin-top: auto; border-top: 1px solid var(--border); padding: 12px 14px; }
        .sidebar-footer a { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-muted); text-decoration: none; margin-bottom: 12px; transition: color 150ms; }
        .sidebar-footer a:hover { color: var(--text-primary); }
        .brand-footer { display: flex; align-items: center; justify-content: space-between; }
        .brand-name { display: flex; align-items: center; gap: 5px; font-size: 13px; font-weight: 500; color: var(--text-primary); }
        .brand-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--gradient-brand); }
        .sidebar-toggle { width: 24px; height: 24px; border-radius: var(--radius-sm); background: var(--surface); border: none; color: var(--text-secondary); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 150ms; }
        .sidebar-toggle:hover { background: var(--border); color: var(--text-primary); }

        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
