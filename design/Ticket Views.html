        :root {
            --primary: #F97316; --primary-50: #FFF4EC; --primary-100: #FEE9DA; --primary-200: #FDD2B4;
            --primary-400: #FB9A57; --primary-600: #D66313;
            --secondary: #EC4899; --tertiary: #6366F1;
            --neutral-500: #18181B; --neutral-400: #59595B; --neutral-300: #909092;
            --neutral-200: #B5B5B6; --neutral-100: #DADADB; --neutral-50: #EDEDED;
            --text-primary: #18181B; --text-secondary: #A1A1AA; --text-muted: #71717A;
            --surface: #F4F2EB; --background: #FFFFFF; --border: #E2E0D8;
            --destructive: #DC2626; --success: #16A34A; --warning: #CA8A04;
            --font-sans: 'Inter', sans-serif; --font-mono: 'Geist Mono', ui-monospace, monospace;

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-sans); -webkit-font-smoothing: antialiased;
            background: var(--surface); color: var(--text-primary);
            display: flex; align-items: center; justify-content: center;
            height: 100vh; width: 100%; overflow: hidden; padding: 24px;
        }
        .caption { font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; line-height: 15px; color: var(--text-secondary); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        .app-shell { width: 100%; max-width: 1440px; height: 92vh; max-height: 900px; background: var(--background); border-radius: var(--radius-lg); border: 1px solid var(--border); box-shadow: var(--shadow-card); display: flex; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 256px; flex-shrink: 0; border-right: 1px solid var(--border); display: flex; flex-direction: column; background: var(--background); }
        .sidebar-profile { padding: 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 150ms; }
        .sidebar-profile:hover { background: var(--surface); }
        .sidebar-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--gradient-brand); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; letter-spacing: 0.02em; }
        .sidebar-profile-info h3 { font-size: 14px; font-weight: 500; line-height: 1.2; }
        .sidebar-profile-info p { font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-secondary); margin-top: 1px; }
        .search-box { padding: 16px 20px; }
        .search-box .inner { position: relative; display: flex; align-items: center; }
        .search-box input { width: 100%; padding: 8px 48px 8px 36px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 14px; font-family: var(--font-sans); outline: none; color: var(--text-primary); transition: border-color 150ms; }
        .search-box input::placeholder { color: var(--text-secondary); }
        .search-box input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(249,115,22,0.12); }
        .search-box .icon { position: absolute; left: 10px; color: var(--text-secondary); font-size: 16px; }
        .search-box .shortcut { position: absolute; right: 8px; font-size: 10px; font-weight: 500; font-family: var(--font-mono); color: var(--text-secondary); background: var(--background); border: 1px solid var(--border); padding: 1px 6px; border-radius: 3px; display: flex; align-items: center; gap: 2px; }
        .nav-section { padding: 0 12px; }
        .nav-section-label { padding: 6px 12px 8px; }
        .nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: var(--radius-lg); font-size: 14px; font-weight: 400; color: var(--text-muted); text-decoration: none; transition: all 150ms; cursor: pointer; border: none; background: none; width: 100%; text-align: left; font-family: var(--font-sans); }
        .nav-item:hover { background: rgba(244,242,235,0.6); color: var(--text-primary); }
        .nav-item.active { background: var(--surface); color: var(--text-primary); font-weight: 500; }
        .nav-item iconify-icon { font-size: 20px; color: #D4D4D8; flex-shrink: 0; }
        .nav-item.active iconify-icon { color: var(--text-primary); }
        .nav-item .badge { margin-left: auto; min-width: 20px; height: 20px; border-radius: 10px; background: var(--primary); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; padding: 0 6px; }
        .sidebar-section { padding: 0 20px; margin-top: 20px; }
        .sidebar-section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
        .sidebar-section-header button { font-size: 10px; font-family: var(--font-sans); font-weight: 500; color: var(--primary); background: none; border: none; cursor: pointer; letter-spacing: 0.05em; text-transform: uppercase; }
        .convo-item { display: flex; align-items: center; justify-content: space-between; padding: 8px; border-radius: var(--radius-md); cursor: pointer; transition: background 150ms; }
        .convo-item:hover { background: var(--surface); }
        .convo-item.elevated { background: var(--background); border: 1px solid var(--border); box-shadow: rgba(0,0,0,0.04) 0 1px 3px; padding: 10px 12px; margin: 0 -4px; }
        .convo-icon { width: 32px; height: 32px; border-radius: var(--radius-sm); background: var(--surface); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 16px; flex-shrink: 0; }
        .convo-count { min-width: 20px; height: 20px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 600; }
        .convo-count.hot { background: var(--primary); color: #fff; }
        .convo-count.muted { background: var(--neutral-50); color: var(--text-secondary); }
        .pinned-item { display: flex; align-items: center; justify-content: space-between; padding: 4px 0; cursor: pointer; }
        .pinned-item:hover .pin-icon { color: var(--primary); }
        .pinned-dot { width: 16px; height: 16px; border-radius: 50%; background: var(--success); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 9px; flex-shrink: 0; }
        .pin-icon { color: var(--neutral-100); font-size: 12px; transition: color 150ms; }
        .sidebar-footer { margin-top: auto; border-top: 1px solid var(--border); padding: 16px 20px; }
        .sidebar-footer a { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--text-muted); text-decoration: none; margin-bottom: 16px; transition: color 150ms; }
        .sidebar-footer a:hover { color: var(--text-primary); }
        .brand-footer { display: flex; align-items: center; justify-content: space-between; }
        .brand-name { display: flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 500; color: var(--text-primary); }
        .brand-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gradient-brand); }
        .sidebar-toggle { width: 28px; height: 28px; border-radius: var(--radius-sm); background: var(--surface); border: none; color: var(--text-secondary); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 150ms; }
        .sidebar-toggle:hover { background: var(--border); color: var(--text-primary); }

        /* Main */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .main-header { height: 56px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 28px; flex-shrink: 0; }
        .main-header h1 { font-size: 18px; font-weight: 500; letter-spacing: -0.02em; }
    </style>
