<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..800&family=Geist+Mono:wght@300..800&display=swap" rel="stylesheet"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',sans-serif;background:#fff;overflow:hidden}</style><style>
body{height:150px;display:flex;gap:12px;padding:16px;align-items:stretch}
.c{flex:1;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
.c .dot{width:32px;height:32px;border-radius:50%}
.c span{font-size:10px;font-weight:500;letter-spacing:0.05em;font-family:'Geist Mono',monospace;color:#555}
</style></head><body>
<div class="c" style="background:#FFF4EC"><div class="dot" style="background:#F97316"></div><span>Primary</span></div>
<div class="c" style="background:#F0FDF4"><div class="dot" style="background:#16A34A"></div><span>Success</span></div>
<div class="c" style="background:#FFFBEB"><div class="dot" style="background:#CA8A04"></div><span>Warning</span></div>
<div class="c" style="background:#FEF2F2"><div class="dot" style="background:#DC2626"></div><span>Destructive</span></div>
<div class="c" style="background:#F4F2EB"><div class="dot" style="background:#18181B"></div><span>Surface</span></div>
</body></html>
