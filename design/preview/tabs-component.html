<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..800&family=Geist+Mono:wght@300..800&display=swap" rel="stylesheet"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',sans-serif;background:#fff;overflow:hidden}</style><style>
body{height:150px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;padding:16px;font-feature-settings:"ss01","cv11"}
.tabs{display:inline-flex;background:#F4F2EB;border-radius:32px;padding:3px}
.tab{padding:6px 14px;border-radius:32px;font-size:12px;font-weight:500;letter-spacing:1.2px;text-transform:uppercase;border:none;cursor:pointer}
.tab.active{background:#fff;color:#18181B}
.tab.inactive{background:none;color:#A1A1AA}
</style></head><body>
<div class="tabs"><button class="tab active">Tickets</button><button class="tab inactive">Agents</button><button class="tab inactive">Settings</button></div>
<div style="display:flex;align-items:center;gap:8px">
<span style="width:6px;height:6px;border-radius:50%;background:#F97316"></span>
<span style="font-size:10px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:#18181B">Status badge:</span>
<span style="display:inline-flex;padding:2px 10px;border-radius:3px;font-size:10px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;background:#FFF4EC;color:#D66313;border:1px solid #FDD2B4">open</span>
<span style="display:inline-flex;padding:2px 10px;border-radius:3px;font-size:10px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;background:#FFFBEB;color:#92400E;border:1px solid #FCD34D">pending</span>
<span style="display:inline-flex;padding:2px 10px;border-radius:3px;font-size:10px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;background:#F0FDF4;color:#16A34A;border:1px solid #BBF7D0">resolved</span>
</div>
</body></html>
