<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..800&family=Geist+Mono:wght@300..800&display=swap" rel="stylesheet"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',sans-serif;background:#fff;overflow:hidden}</style><style>
body{height:150px;display:flex;flex-direction:column;justify-content:center;padding:16px 24px;gap:8px}
.row{display:flex;align-items:center;gap:8px}
.bar{height:12px;background:#F97316;border-radius:2px;opacity:0.7}
.lbl{font-size:9px;font-weight:500;font-family:'Geist Mono',monospace;color:#A1A1AA;width:80px;text-align:right;flex-shrink:0}
</style></head><body>
<div class="row"><span class="lbl">4px unit</span><div class="bar" style="width:16px"></div></div>
<div class="row"><span class="lbl">16px gap</span><div class="bar" style="width:64px"></div></div>
<div class="row"><span class="lbl">24px field</span><div class="bar" style="width:96px"></div></div>
<div class="row"><span class="lbl">32px content</span><div class="bar" style="width:128px"></div></div>
<div class="row"><span class="lbl">40px card pad</span><div class="bar" style="width:160px"></div></div>
</body></html>
