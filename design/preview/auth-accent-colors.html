<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..800&family=Geist+Mono:wght@300..800&display=swap" rel="stylesheet"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',sans-serif;background:#fff;overflow:hidden}</style><style>
body{height:150px;display:flex;flex-direction:column}
.grad{flex:1;background:linear-gradient(to right bottom,#FB923C 0%,#EC4899 55%,#6366F1 100%)}
.swatches{display:flex;height:50px}
.sw{flex:1;display:flex;align-items:center;justify-content:center}
.sw span{font-size:10px;font-weight:600;letter-spacing:0.05em;font-family:'Geist Mono',monospace;color:#fff}
</style></head><body>
<div class="grad"></div>
<div class="swatches">
<div class="sw" style="background:#F97316"><span>Orange</span></div>
<div class="sw" style="background:#EC4899"><span>Pink</span></div>
<div class="sw" style="background:#6366F1"><span>Indigo</span></div>
</div>
</body></html>
