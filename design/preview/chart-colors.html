<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..800&family=Geist+Mono:wght@300..800&display=swap" rel="stylesheet"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',sans-serif;background:#fff;overflow:hidden}</style><style>
body{height:150px;display:flex;align-items:flex-end;padding:20px 24px;gap:8px;background:#fafafa}
.bar{flex:1;border-radius:3px 3px 0 0;position:relative}
.bar span{position:absolute;bottom:-16px;left:0;right:0;text-align:center;font-size:8px;font-weight:500;letter-spacing:0.05em;font-family:'Geist Mono',monospace;color:#A1A1AA}
</style></head><body>
<div class="bar" style="background:#FFF4EC;height:20%"><span>50</span></div>
<div class="bar" style="background:#FDD2B4;height:35%"><span>200</span></div>
<div class="bar" style="background:#FB9A57;height:50%"><span>400</span></div>
<div class="bar" style="background:#F97316;height:70%"><span>500</span></div>
<div class="bar" style="background:#D66313;height:85%"><span>600</span></div>
<div class="bar" style="background:#AE510F;height:95%"><span>700</span></div>
<div class="bar" style="background:#552707;height:100%"><span>900</span></div>
</body></html>
