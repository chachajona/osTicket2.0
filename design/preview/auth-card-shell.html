<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..800&family=Geist+Mono:wght@300..800&display=swap" rel="stylesheet"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',sans-serif;background:#fff;overflow:hidden}</style><style>
body{height:150px;display:flex;align-items:center;justify-content:center;background:#fff;padding:16px;font-feature-settings:"ss01","cv11"}
.shell{padding:1px;border-radius:8px;background:linear-gradient(to right bottom,#FB923C 0%,#EC4899 55%,#6366F1 100%);box-shadow:rgba(236,72,153,0.10) 0 10px 15px -3px,rgba(236,72,153,0.10) 0 4px 6px -4px;width:400px}
.inner{border-radius:7px;background:#F4F2EB;padding:24px}
.cap{font-size:10px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:#A1A1AA}
.title{font-size:16px;font-weight:500;color:#18181B;margin-top:8px}
</style></head><body>
<div class="shell"><div class="inner">
<div class="cap">Gradient Shell Pattern</div>
<div class="title">1px gradient border card with cream interior and pink-tinted shadow</div>
</div></div>
</body></html>
