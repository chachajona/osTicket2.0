<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..800&family=Geist+Mono:wght@300..800&display=swap" rel="stylesheet"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',sans-serif;background:#fff;overflow:hidden}</style><style>
body{height:150px;display:flex;align-items:center;justify-content:center;gap:16px;padding:16px;background:#fafafa}
.btn{display:inline-flex;align-items:center;justify-content:center;height:36px;padding:0 16px;font-size:12px;font-weight:500;letter-spacing:1.2px;text-transform:uppercase;border:none;cursor:pointer;white-space:nowrap}
</style></head><body>
<button class="btn" style="background:#F4F2EB;color:#27272A;border-radius:3px">Primary</button>
<button class="btn" style="background:#fff;color:#18181B;border-radius:3px;border:1px solid #E2E0D8">Outline</button>
<button class="btn" style="background:none;color:#18181B;border-radius:0;padding:0 0 2px 0;border-bottom:1px solid #18181B;height:auto">Secondary</button>
<button class="btn" style="background:none;color:#3F3F46;padding:0;height:auto">Ghost</button>
<button class="btn" style="background:#FEF2F2;color:#DC2626;border-radius:3px">Destructive</button>
</body></html>
