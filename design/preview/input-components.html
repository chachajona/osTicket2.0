<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..800&family=Geist+Mono:wght@300..800&display=swap" rel="stylesheet"><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Inter',sans-serif;background:#fff;overflow:hidden}</style><style>
body{height:150px;display:flex;align-items:center;justify-content:center;gap:16px;padding:16px 24px;background:#F4F2EB;font-feature-settings:"ss01","cv11"}
.field{display:flex;flex-direction:column;gap:6px;width:200px}
.lbl{font-size:10px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:#A1A1AA}
input{height:44px;border-radius:4px;border:1px solid #E2E0D8;background:#fff;padding:0 14px;font-size:14px;color:#18181B;outline:none;font-family:'Inter',sans-serif}
</style></head><body>
<div class="field"><span class="lbl">Default</span><input value="admin" readonly></div>
<div class="field"><span class="lbl">Focused</span><input style="border-color:#18181B;box-shadow:0 0 0 3px rgba(249,115,22,0.18)" readonly></div>
<div class="field"><span class="lbl">Error</span><input style="border-color:#DC2626;box-shadow:0 0 0 3px rgba(220,38,38,0.12)" value="bad" readonly></div>
</body></html>
