# osTicket 2.0 Nginx Reverse Proxy Configuration
# Routes /scp/* to Laravel, everything else to legacy osTicket initially
# Handles SSL termination, rate limiting, and static assets

# Upstream definitions
upstream laravel_app {
    # Laravel PHP-FPM socket or TCP connection
    server 127.0.0.1:9000;
    # For multiple servers: server 127.0.0.1:9001; server 127.0.0.1:9002;
}

upstream legacy_osticket {
    # Legacy osTicket PHP-FPM or Apache
    server 127.0.0.1:8080;
    # If using Apache: keep_alive 64;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=general_limit:10m rate=30r/s;

# HTTPS redirect server block
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

# Main HTTPS server block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    # SSL Configuration (replace with your actual certificate paths)
    ssl_certificate /etc/ssl/certs/osticket.crt;
    ssl_certificate_key /etc/ssl/private/osticket.key;

    # Modern SSL configuration (TLS 1.2+)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS (HTTP Strict Transport Security) - comment out if not ready
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Root directory for serving static files
    root /var/www/osticket2.0;

    # Log locations
    access_log /var/log/nginx/osticket_access.log combined;
    error_log /var/log/nginx/osticket_error.log;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json;
    gzip_min_length 1024;

    # Prevent access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ============================================================
    # LARAVEL SCP (STAFF CONTROL PANEL) - Routes to Laravel
    # ============================================================
    location ^~ /scp {
        limit_req zone=general_limit burst=50 nodelay;
        root /var/www/osticket2.0/public;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ============================================================
    # LARAVEL API ROUTES - For legacy API compatibility layer (Task 13)
    # ============================================================
    location ^~ /api {
        limit_req zone=api_limit burst=20 nodelay;
        root /var/www/osticket2.0/public;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /index.php {
        internal;
        fastcgi_pass laravel_app;
        fastcgi_index index.php;
        include fastcgi_params;
        root /var/www/osticket2.0/public;
        fastcgi_param SCRIPT_FILENAME $realpath_root/index.php;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
    }

    location ~ \.php$ {
        return 404;
    }

    # ============================================================
    # STATIC ASSETS - Served directly (no PHP execution)
    # ============================================================
    
    # Laravel public assets (css, js, images)
    location ~ ^/(css|js|images|fonts|storage)/.+$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Legacy osTicket static assets
    location ~ ^/osticket/(css|js|images|attachments)/ {
        root /var/www;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~ \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ============================================================
    # LEGACY OSTICKET - Routes everything else to legacy system
    # ============================================================
    location / {
        limit_req zone=general_limit burst=50 nodelay;

        # Proxy to legacy osTicket (running on separate upstream)
        proxy_pass http://legacy_osticket;
        proxy_http_version 1.1;

        # Preserve original headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Connection settings
        proxy_set_header Connection "upgrade";
        proxy_set_header Upgrade $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }

    # ============================================================
    # HEALTH CHECK ENDPOINT
    # ============================================================
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

# ============================================================
