# PHP-FPM Pool Configuration for osTicket 2.0
# Place this file in: /etc/php/8.2/fpm/pool.d/osticket.conf
# Or adjust version number (8.1, 8.3, etc.) based on your PHP installation

# ===========================================================
# Laravel Application Pool (main SCP and API)
# ===========================================================
[osticket-laravel]
user = www-data
group = www-data

# Listen address (adjust port if needed)
listen = 127.0.0.1:9000
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

# Process management
pm = dynamic
pm.max_children = 20
pm.start_servers = 5
pm.min_spare_servers = 2
pm.max_spare_servers = 10
pm.max_requests = 500

# Logging
slowlog = /var/log/php-fpm/osticket-laravel.slow.log
slowlog_timeout = 10s
catch_workers_output = yes
error_log = /var/log/php-fpm/osticket-laravel.error.log

# Environment variables for Laravel
env[APP_ENV] = production
env[APP_DEBUG] = false
env[CACHE_DRIVER] = redis
env[SESSION_DRIVER] = redis
env[QUEUE_CONNECTION] = redis

# ===========================================================
# Legacy osTicket Pool (separate from Laravel for isolation)
# ===========================================================
# Uncomment if running legacy osTicket via PHP-FPM
# (Usually Apache or separate web server handles legacy)

# [osticket-legacy]
# user = www-data
# group = www-data
# listen = 127.0.0.1:9001
# listen.owner = www-data
# listen.group = www-data
