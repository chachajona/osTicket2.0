# catch_workers_output = yes
# error_log = /var/log/php-fpm/osticket-legacy.error.log
#
# env[APP_ENV] = production
# env[APP_DEBUG] = false

# ===========================================================
# NOTES
# ===========================================================
# After creating/modifying this file:
#
# 1. Verify syntax:
#    php-fpm -t
#
# 2. Reload PHP-FPM:
#    systemctl reload php8.2-fpm
#    # or: service php8.2-fpm reload
#
# 3. Check status:
#    systemctl status php8.2-fpm
#
# 4. View logs:
#    tail -f /var/log/php-fpm/osticket-laravel.error.log
#    tail -f /var/log/php-fpm/osticket-laravel.slow.log
#
# 5. Monitor process count:
#    ps aux | grep "php-fpm"
#
# 6. Performance tuning:
#    - Increase pm.max_children if you see "max_children reached"
#    - Increase pm.max_requests if you see frequent restarts
#    - Adjust timeout values based on your application performance
