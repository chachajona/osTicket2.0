# osTicket 2.0 Apache Reverse Proxy Configuration
# Routes /scp/* to the Laravel HTTP app server, everything else to legacy osTicket initially
# Handles SSL termination, rate limiting, and static assets

# Enable required modules:
# a2enmod proxy
# a2enmod proxy_http
# a2enmod rewrite
# a2enmod ssl
# a2enmod ratelimit
# a2enmod headers
# a2enmod deflate
# a2enmod expires

<VirtualHost *:80>
    ServerName osticket.example.com
    ServerAlias www.osticket.example.com

    # Redirect all HTTP to HTTPS
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
</VirtualHost>

<VirtualHost *:443>
    ServerName osticket.example.com
    ServerAlias www.osticket.example.com

    # SSL Configuration
    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/osticket.crt
    SSLCertificateKeyFile /etc/ssl/private/osticket.key
    # SSLCertificateChainFile /etc/ssl/certs/osticket_chain.crt  # If using intermediate certs

    # Modern SSL Configuration (TLS 1.2+)
    SSLProtocol TLSv1.2 TLSv1.3
    SSLCipherSuite HIGH:!aNULL:!MD5
    SSLHonorCipherOrder on
    SSLSessionCache shmcb:/var/cache/apache2/ssl_scache(512000)
    SSLSessionCacheTimeout 300

    # HSTS (HTTP Strict Transport Security)
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"

    # Logging
    DocumentRoot /var/www/osticket2.0
    ErrorLog ${APACHE_LOG_DIR}/osticket_error.log
    CustomLog ${APACHE_LOG_DIR}/osticket_access.log combined

    # Gzip Compression
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/plain
        AddOutputFilterByType DEFLATE text/html
        AddOutputFilterByType DEFLATE text/xml
        AddOutputFilterByType DEFLATE text/css
        AddOutputFilterByType DEFLATE text/javascript
        AddOutputFilterByType DEFLATE application/xml
        AddOutputFilterByType DEFLATE application/xhtml+xml
        AddOutputFilterByType DEFLATE application/rss+xml
        AddOutputFilterByType DEFLATE application/javascript
        AddOutputFilterByType DEFLATE application/x-javascript
        AddOutputFilterByType DEFLATE application/json
    </IfModule>

    # ============================================================
    # SECURITY HEADERS
    # ============================================================
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # ============================================================
    # PREVENT ACCESS TO SENSITIVE FILES
    # ============================================================
    <FilesMatch "^\.">
        Deny from all
    </FilesMatch>

    <FilesMatch "\.(log|sql|sqlite|db)$">
        Deny from all
    </FilesMatch>

    # ============================================================
    # STATIC ASSETS CACHING & DIRECT SERVING
    # ============================================================
    <IfModule mod_expires.c>
        ExpiresActive On
        ExpiresDefault "access plus 1 month"

        # Laravel public assets
        ExpiresByType text/css "access plus 1 year"
        ExpiresByType application/javascript "access plus 1 year"
        ExpiresByType image/jpeg "access plus 1 year"
        ExpiresByType image/gif "access plus 1 year"
        ExpiresByType image/png "access plus 1 year"
        ExpiresByType image/webp "access plus 1 year"
        ExpiresByType image/svg+xml "access plus 1 year"
        ExpiresByType font/woff "access plus 1 year"
        ExpiresByType font/woff2 "access plus 1 year"
        ExpiresByType font/ttf "access plus 1 year"
        ExpiresByType font/eot "access plus 1 year"

        # HTML/API responses
        ExpiresByType text/html "access plus 1 day"
        ExpiresByType application/json "access plus 1 day"
    </IfModule>

    # Cache control headers for static assets
    <FilesMatch "\.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$">
        Header set Cache-Control "public, immutable"
    </FilesMatch>

    # ============================================================
    # RATE LIMITING
    # ============================================================
    <IfModule mod_ratelimit.c>
        # Apply general rate limit to most requests
        <Location />
            SetOutputFilter RATE_LIMIT
            # 30 requests per second per IP
            Rate ~500  # kB/s
        </Location>

        # Stricter rate limit for API endpoints
        <Location /api>
            SetOutputFilter RATE_LIMIT
            # 10 requests per second per IP for APIs
            Rate ~100  # kB/s
        </Location>
    </IfModule>

    # ============================================================
    # ROUTING CONFIGURATION
    # ============================================================
    RewriteEngine On
    RewriteBase /

    # Preserve Authorization headers
    RewriteCond %{HTTP:Authorization} .
    RewriteRule .* - [E=HTTP_AUTHORIZATION:%{HTTP:Authorization}]

    # Prevent access to /. files
    RewriteRule "^\." - [F]

    # ============================================================
    # LARAVEL SCP (STAFF CONTROL PANEL) ROUTES
    # Routes /scp/* to a Laravel HTTP upstream (for example Nginx/Caddy/Apache)
    # ============================================================
    <Location /scp>
        ProxyPass http://127.0.0.1:8000/scp
        ProxyPassReverse http://127.0.0.1:8000/scp
        ProxyPreserveHost On
        ProxyAddHeaders On

        # Forward original request details
        RequestHeader set X-Real-IP "%{REMOTE_ADDR}s"
        RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}s"
        RequestHeader set X-Forwarded-Proto "%{REQUEST_SCHEME}s"
        RequestHeader set X-Forwarded-Host "%{HTTP_HOST}s"

        # Rate limiting for SCP
        SetOutputFilter RATE_LIMIT
        Rate ~500  # kB/s
    </Location>

    # ============================================================
    # LARAVEL API ROUTES
    # For legacy API compatibility layer (Task 13)
    # ============================================================
    <Location /api>
        ProxyPass http://127.0.0.1:8000/api
        ProxyPassReverse http://127.0.0.1:8000/api
        ProxyPreserveHost On
        ProxyAddHeaders On

        # Forward original request details
        RequestHeader set X-Real-IP "%{REMOTE_ADDR}s"
        RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}s"
        RequestHeader set X-Forwarded-Proto "%{REQUEST_SCHEME}s"
        RequestHeader set X-Forwarded-Host "%{HTTP_HOST}s"

        # Stricter rate limiting for API
        SetOutputFilter RATE_LIMIT
        Rate ~100  # kB/s (10 req/sec per IP)
    </Location>

    # ============================================================
    # LEGACY OSTICKET ROUTES
    # Everything else routes to legacy system running on port 8080
    # ============================================================
    <Location />
        ProxyPass http://127.0.0.1:8080/
        ProxyPassReverse http://127.0.0.1:8080/
        ProxyPreserveHost On
        ProxyAddHeaders On

        # Forward original request details
        RequestHeader set X-Real-IP "%{REMOTE_ADDR}s"
        RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}s"
        RequestHeader set X-Forwarded-Proto "%{REQUEST_SCHEME}s"
        RequestHeader set X-Forwarded-Host "%{HTTP_HOST}s"

        # Connection settings
        SetEnv proxy-sendcl 1
        SetEnv force-proxy-request-1.0 1
        SetEnv proxy-connection-timeout 60
        SetEnv proxy-read-timeout 60
    </Location>

    # ============================================================
    # HEALTH CHECK ENDPOINT
    # ============================================================
    <Location /health>
        ProxyPass "!"
        SetHandler server-status
    </Location>

</VirtualHost>

# ============================================================
# APACHE STATUS/MONITORING (optional)
# ============================================================
# Enable mod_status for monitoring:
# a2enmod status

# <Location /server-status>
#     SetHandler server-status
#     Require local
#     # Or: Require ip 192.168.1.0/24
# </Location>

# View status: curl https://osticket.example.com/server-status

# ============================================================
# NOTES
# ============================================================
# 1. Replace "osticket.example.com" with your actual domain
# 2. Replace certificate paths with your actual SSL certificate locations
# 3. Adjust upstream ports based on your HTTP app server configuration
# 4. For rate limiting, enable mod_ratelimit: a2enmod ratelimit
# 5. Test configuration: apachectl configtest
# 6. Reload: systemctl reload apache2
# 7. View logs: tail -f /var/log/apache2/osticket_access.log
